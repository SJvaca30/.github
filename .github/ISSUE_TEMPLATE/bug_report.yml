name: Bug report
description: Report a reproducible defect or regression.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, tokens, credentials, private session contents, or raw personal data.
        If this is security-sensitive, do not file a public issue. Use the repository security policy instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken, and why does it matter?
      placeholder: A concise description of the observed defect.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Minimal, precise steps or a minimal reproduction link.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs actual
      value: |
        Expected:

        Actual:
    validations:
      required: true
  - type: dropdown
    id: affected-area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Not sure
        - Frontend/UI
        - Backend/API
        - CLI
        - Data/storage
        - Infrastructure/CI
        - Documentation
        - Tests
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime, browser/device, package versions, deployment target, or relevant commit.
      placeholder: "OS: macOS 15.x; Runtime: Node 22.x; Browser: Chrome ..."
    validations:
      required: false
  - type: textarea
    id: regression
    attributes:
      label: Regression evidence
      description: Last known good version, first bad version, related PR, commit SHA, or release if known.
      placeholder: "Worked in ..., started failing after ..., possibly related to #..."
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs, screenshots, or artifacts
      description: Attach only redacted logs or screenshots.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, tokens, credentials, private session contents, and raw personal data.
          required: true
        - label: This is not a public security vulnerability report.
          required: true
  - type: textarea
    id: ai-context
    attributes:
      label: AI context
      description: Optional hints that help an AI agent localize the problem.
      value: |
        Suspected files/modules:
        Related issues/PRs:
        Constraints:
        Done when:
    validations:
      required: false
